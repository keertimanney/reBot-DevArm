# Rectangular grid configuration
#
# Corner ordering (viewed from above):
#
#   C4 ─────── C3
#    │           │
#    │           │
#   C1 ─────── C2
#
# Cell (i, j):  i = column  0 .. nx-1  (C1 → C2 direction)
#               j = row     0 .. ny-1  (C1 → C4 direction)
#
# Replace the placeholder [x, y] values with your actual robot-frame coords (metres).

corners:
  C1: [0.10, -0.20]   # column=0,    row=0      (near-left)
  C2: [0.10,  0.20]   # column=nx-1, row=0      (near-right)
  C3: [0.30,  0.20]   # column=nx-1, row=ny-1   (far-right)
  C4: [0.30, -0.20]   # column=0,    row=ny-1   (far-left)

grid:
  nx: 8   # number of columns  (i = 0 .. 7)
  ny: 4   # number of rows     (j = 0 .. 3)

z_height: 0.10   # metres — Z used for all grid moves
